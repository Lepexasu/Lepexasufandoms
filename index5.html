<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lepexasu | Fandoms</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-color: #050505;
            --reze-purple: #4a2d5e; 
            --bright-purple: #a46dff;
            --pixel-font: 'Press Start 2P', cursive;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes blinker { 50% { opacity: 0; } }
        .blink { animation: blinker 1s linear infinite; }

        * {
            font-family: var(--pixel-font) !important;
            image-rendering: pixelated;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(0deg, rgba(74, 45, 94, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(74, 45, 94, 0.05) 2px, transparent 2px);
            background-size: 40px 40px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 450px; 
        }

.photo-row {
    display: flex;
    gap: 15px;
    width: 100%;
    justify-content: space-between;
}

.side-photo {
    width: calc(50% - 7.5px);
    height: 180px; 
    object-fit: cover;
    border: 3px double var(--reze-purple);
    padding: 4px;
    background: rgba(74, 45, 94, 0.1);
    animation: fadeIn 1s ease-out;
    box-sizing: border-box;
}


        .card {
            background: rgba(0, 0, 0, 0.95);
            border: 4px double var(--reze-purple);
            padding: 25px 15px;
            text-align: center;
            box-shadow: 8px 8px 0px rgba(74, 45, 94, 0.2);
            animation: fadeIn 0.8s ease-out;
            width: 100%;
        }

        h1 {
            font-size: 0.9rem;
            color: var(--bright-purple);
            text-shadow: 0 0 8px var(--reze-purple);
            margin: 0 0 25px 0;
        }

        .fandoms-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }

        .fandom-card {
            display: flex;
            flex-direction: column;
            border: 3px double var(--reze-purple);
            background: rgba(74, 45, 94, 0.05);
            text-decoration: none;
            transition: 0.3s ease-in-out;
            overflow: visible; 
            width: 100%;
        }

        .fandom-card:hover {
            transform: scale(1.03);
            border-color: var(--bright-purple);
            box-shadow: 0 8px 15px rgba(164, 109, 255, 0.15);
        }

.f-image {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
    background: #000;
    transition: 0.4s;
    filter: none;
}
        .f-info {
            padding: 12px;
            text-align: left;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid var(--reze-purple);
        }

        .f-label { 
            color: #444; 
            font-size: 0.35rem; 
            display: block; 
            margin-bottom: 6px;
        }

        .f-name { 
            font-size: 0.5rem; 
            color: #eee; 
            display: block;
            transition: 0.3s ease-in-out;
            transform-origin: left center;
        }

        .fandom-card:hover .f-name {
            color: var(--bright-purple);
            transform: scale(1.3);
            padding-left: 5px;
        }

        .disconnect-btn {
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid #333;
            color: #333;
            text-decoration: none;
            font-size: 0.5rem;
            cursor: pointer;
            transition: 0.3s;
            background: none;
        }

        .disconnect-btn:hover {
            border-color: var(--bright-purple);
            color: var(--bright-purple);
        }
    </style>
</head>
